[package]
name = "proto-packet"
version = "0.0.0"
description = "This library provides the dependencies for generated ProtoPacket code."
readme = "README.md"
repository = "https://github.com/nikdeapen/proto-packet"
homepage = "https://github.com/nikdeapen/proto-packet"
authors = ["Nik Deapen <nik@deapen.com>"]
edition = "2024"
license = "MIT"

[dependencies]
enc = { version = "0.19.0-rc.2", features = ["var-int"] }

serde = { version = "1.0.228", features = ["derive"] }
